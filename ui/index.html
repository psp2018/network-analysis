<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Network Analysis</title>
    <link rel="stylesheet" href="/ui/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-label="Network controls">
        <div>
          <h1>Network Analysis</h1>
          <p id="networkStatus">Loading inventory...</p>
        </div>
        <div class="controls">
          <label class="select-label" for="scenarioSelect">Scenario</label>
          <select id="scenarioSelect" aria-label="Traffic scenario">
            <option value="mixed">Mixed traffic</option>
            <option value="normal">Normal</option>
            <option value="scan">Port scan</option>
            <option value="wireless">Wireless load</option>
          </select>
          <button id="startButton" class="primary-button" type="button" aria-pressed="false">
            <span>Start</span>
          </button>
          <button id="exportButton" class="icon-button" type="button" aria-label="Export telemetry CSV" title="Export telemetry CSV">
            Export CSV
          </button>
          <button id="resetButton" class="icon-button" type="button" aria-label="Reset simulation" title="Reset simulation">
            Clear
          </button>
        </div>
      </section>

      <section class="metrics-grid" aria-label="Network summary">
        <div class="metric">
          <span class="metric-label">Devices</span>
          <strong id="deviceCount">0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">Links</span>
          <strong id="linkCount">0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">Events</span>
          <strong id="eventCount">0</strong>
        </div>
        <div class="metric">
          <span class="metric-label">Anomalies</span>
          <strong id="anomalyCount">0</strong>
        </div>
        <div class="metric care-metric">
          <span class="metric-label">Platinum Risk</span>
          <strong id="platinumRiskCount">0</strong>
        </div>
        <div class="metric care-metric">
          <span class="metric-label">Likely Tickets</span>
          <strong id="ticketRiskCount">0</strong>
        </div>
      </section>

      <section class="workspace">
        <div class="network-panel">
          <div class="panel-header">
            <h2>Topology</h2>
            <span id="activeFlow" class="status-pill">No active flow</span>
          </div>
          <svg id="networkMap" role="img" aria-label="Network topology visualization"></svg>
        </div>

        <aside class="side-panel" aria-label="Telemetry details">
          <div class="panel-header">
            <h2>Live Telemetry</h2>
            <span id="eventRate">Idle</span>
          </div>
          <div class="tabs" role="tablist" aria-label="Telemetry views">
            <button id="eventsTab" class="tab-button active" type="button" role="tab" aria-selected="true" aria-controls="eventList">
              Events
              <span id="eventsTabCount">0</span>
            </button>
            <button id="anomaliesTab" class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="eventList">
              Anomalies
              <span id="anomaliesTabCount">0</span>
            </button>
            <button id="careTab" class="tab-button" type="button" role="tab" aria-selected="false" aria-controls="eventList">
              Care Desk
              <span id="careTabCount">0</span>
            </button>
          </div>
          <div id="eventList" class="event-list" aria-live="polite"></div>
        </aside>
      </section>

      <section class="inventory-section" aria-label="Infrastructure inventory">
        <div class="panel-header">
          <h2>Infrastructure Inventory</h2>
          <span>Master table</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Device</th>
                <th>Type</th>
                <th>Site</th>
                <th>Role</th>
                <th>Vendor</th>
                <th>Criticality</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="inventoryTable"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="/ui/app.js"></script>
  </body>
</html>
